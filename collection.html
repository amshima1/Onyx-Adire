<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Onyx-Adire Haute Couture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
            --header-height: 105px;
        }

        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: var(--onyx-black); overflow-x: hidden; }

        /* HEADER & PROMO */
        .master-header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            z-index: 9999; background: white; display: flex; flex-direction: column;
            border-bottom: 1px solid #eee;
        }
        .promo-bar {
            background-color: var(--brand-red); color: white; height: 35px;
            display: flex; align-items: center; overflow: hidden; position: relative;
        }
        .marquee-text {
            position: absolute; white-space: nowrap; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; animation: scrolling 20s linear infinite;
        }
        @keyframes scrolling { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        header { height: 70px; display: flex; align-items: center; justify-content: center; position: relative; }
        .hamburger { position: absolute; left: 20px; font-size: 28px; cursor: pointer; }
        .logo { font-family: 'Bodoni Moda', serif; font-size: 24px; text-transform: uppercase; text-decoration: none; color: var(--onyx-black); letter-spacing: 4px; font-weight: 700; }

        /* SIDE MENU */
        .side-menu {
            height: calc(100vh - var(--header-height)); width: 0; position: fixed;
            z-index: 9000; top: var(--header-height); left: 0; background-color: white;
            overflow-x: hidden; transition: 0.4s ease; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        .menu-links { padding-top: 40px; }
        .menu-links a { padding: 15px 40px; display: block; font-family: 'Bodoni Moda', serif; font-size: 18px; text-decoration: none; color: var(--onyx-black); text-transform: uppercase; border-bottom: 1px solid #f9f9f9; }

        /* COLLECTION FILTERS */
        .filter-container { 
            margin-top: var(--header-height); 
            padding: 30px 0; 
            text-align: center; 
            background: #fff;
        }
        .filter-btn { 
            background: none; border: none; font-family: 'Montserrat'; 
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px; 
            margin: 0 15px; cursor: pointer; color: #888; transition: 0.3s; 
        }
        .filter-btn.active { color: var(--onyx-black); font-weight: 700; border-bottom: 1px solid var(--onyx-black); }

        /* GRID */
        .collection-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 0 15px 60px; 
        }
        .collection-item { text-align: center; margin-bottom: 30px; }
        .collection-item img { width: 100%; height: auto; border-radius: 2px; display: block; }
        .item-name { font-family: 'Bodoni Moda', serif; font-size: 14px; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 1px; }
        .item-price { color: var(--brand-red); font-weight: 600; font-size: 12px; }

        /* RED FOOTER BLOCK */
        footer {
            background-color: var(--brand-red);
            color: white;
            text-align: center;
            padding: 80px 20px;
            margin-top: 40px;
        }
        footer h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 400;
        }
        .footer-socials a { color: white; font-size: 26px; margin: 0 20px; text-decoration: none; }

        /* RED WHATSAPP BUTTON */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background-color: var(--brand-red);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            z-index: 9998;
            display: flex;
            align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="master-header">
        <div class="promo-bar"><div class="marquee-text">ONYX-ADIRE • NEW ARRIVALS • HAND-DYED LUXURY • WORLDWIDE SHIPPING AVAILABLE</div></div>
        <header>
            <div class="hamburger" onclick="toggleNav()">☰</div>
            <a href="index.html" class="logo">Onyx-Adire</a>
        </header>
    </div>

    <div id="mySideMenu" class="side-menu">
        <div class="menu-links">
            <a href="index.html" onclick="toggleNav()">Home</a>
            <a href="collection.html" onclick="toggleNav()">Collection</a>
            <a href="trustees.html" onclick="toggleNav()">Trustees</a>
            <a href="events.html" onclick="toggleNav()">Events</a>
            <a href="inquiries.html" onclick="toggleNav()">Inquiries</a>
        </div>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterItems('all')">View All</button>
        <button class="filter-btn" onclick="filterItems('silk')">Silk Edit</button>
        <button class="filter-btn" onclick="filterItems('cotton')">Cotton Heritage</button>
    </div>

    <div class="collection-grid" id="collGrid">
        </div>

    <footer>
        <h2>Join the Onyx Circle</h2>
        <div class="footer-socials">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
    </footer>

    <a href="https://wa.me/234707797XXXX" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i> Chat via WhatsApp
    </a>

    <script>
        // Data for your products
        const products = [
            { id: 1, name: "Sea Shift Gown", price: "₦51,000", cat: "silk" },
            { id: 2, name: "Legacy Adire Set", price: "₦70,000", cat: "cotton" },
            { id: 3, name: "Indigo Wrap Silk", price: "₦45,000", cat: "silk" },
            { id: 4, name: "Sahara Cotton Robe", price: "₦55,000", cat: "cotton" }
        ];

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('collGrid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="collection-item">
                        <img src="Onyx-Adire${p.id}.jpg" alt="${p.name}">
                        <div class="item-name">${p.name}</div>
                        <div class="item-price">${p.price}</div>
                    </div>
                `;
            });
        }

        function filterItems(cat) {
            renderProducts(cat);
            // Update active button state
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleNav() {
            var m = document.getElementById("mySideMenu");
            m.style.width = (m.style.width === "280px") ? "0" : "280px";
        }

        // Initialize the grid on load
        renderProducts();
    </script>
</body>
</html>
