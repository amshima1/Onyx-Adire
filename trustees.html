<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trustees | Onyx—Adire</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #8B1D1D;
            --deep-red-bg: #961926;
            --bg-cream: #FFFBF7;
            --whatsapp-orange: #E65137; 
            --text-dark: #333333;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-cream);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--brand-red);
            text-align: center;
            overflow-x: hidden;
        }

        /* --- STICKY HEADER SYSTEM --- */
        .header-container {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 6000;
            background: var(--bg-cream);
        }

        .announcement-bar {
            background-color: var(--brand-red);
            color: white;
            overflow: hidden;
            white-space: nowrap;
            padding: 10px 0;
        }

        .announcement-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(139, 29, 29, 0.1);
        }

        .menu-icon { width: 30px; cursor: pointer; }
        .menu-icon div { height: 2px; width: 25px; background-color: var(--brand-red); margin: 6px 0; }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-style: italic;
            font-weight: 700;
            text-decoration: none;
            color: var(--brand-red);
        }

        /* --- SIDE NAVIGATION --- */
        #mySidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 5500;
            top: 0;
            left: 0;
            background-color: var(--bg-cream);
            overflow-x: hidden;
            transition: 0.4s ease-in-out;
            padding-top: 120px;
            text-align: left;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
        }

        #mySidenav a {
            padding: 15px 32px;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--brand-red);
            display: block;
            font-style: italic;
        }

        #overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            background: rgba(0,0,0,0.4);
            z-index: 5000;
        }

        /* --- MAIN CONTENT --- */
        main { padding-top: 130px; }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-style: italic;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
            color: var(--text-dark);
        }

        /* --- TRUSTEES GRID --- */
        .trustee-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px 20px;
            padding: 0 20px 80px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .trustee-card img {
            width: 100%;
            aspect-ratio: 1 / 1.3;
            object-fit: cover;
            border-radius: 2px;
        }

        .trustee-name {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-style: italic;
            font-weight: bold;
            margin: 15px 0 5px 0;
            color: var(--brand-red);
        }

        .trustee-role {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
        }

        /* --- FOOTER CTA --- */
        .footer-cta {
            background-color: var(--brand-red);
            color: white;
            padding: 60px 20px;
        }

        .footer-cta h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 26px;
            margin-bottom: 25px;
        }

        .subscribe-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .subscribe-box input {
            width: 100%;
            padding: 14px;
            border: 1px solid white;
            background: transparent;
            color: white;
            text-align: center;
        }

        .subscribe-box button {
            background: white;
            color: var(--brand-red);
            border: none;
            padding: 12px 50px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
        }

        .social-handle {
            margin-top: 40px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 20px;
        }

        /* --- WHATSAPP --- */
        .whatsapp-link {
            position: fixed;
            bottom: 25px;
            right: 20px;
            background-color: var(--whatsapp-orange);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            z-index: 7000;
        }
    </style>
</head>
