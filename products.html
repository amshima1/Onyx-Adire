<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection | Onyx—Adire</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fffcf9; color: #333; overflow-x: hidden; }
        
        /* Navigation & Left-Aligned Menu */
        nav { display: flex; align-items: center; justify-content: center; padding: 25px; border-bottom: 1px solid #f4f4f4; position: relative; background: #fffcf9; }
        .menu-icon { position: absolute; left: 20px; font-size: 28px; cursor: pointer; color: #800020; }
        .logo { text-decoration: none; color: #800020; font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; }

        .menu-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fffcf9; z-index: 1000000; flex-direction: column; padding: 80px 40px; 
        }
        .menu-overlay a { margin: 15px 0; font-size: 14px; text-decoration: none; color: #800020; text-transform: uppercase; letter-spacing: 2px; }

        /* Product Grid Style */
        .section-title { font-family: 'Playfair Display', serif; text-align: center; font-style: italic; margin: 40px 0 20px; color: #800020; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 40px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: #fff; position: relative; cursor: pointer; }
        .card img { width: 100%; height: 350px; object-fit: cover; transition: transform 0.4s ease; }
        .card:hover img { transform: scale(1.02); }
        .meta { padding: 10px; text-align: left; }
        .meta h4 { font-family: 'Playfair Display', serif; font-size: 14px; margin: 0; font-style: italic; }
        .meta p { font-size: 12px; font-weight: bold; margin: 5px 0; }

        /* IMAGE EXPAND MODAL (Lightbox) */
        #imageModal {
            display: none; position: fixed; z-index: 2000000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); justify-content: center; align-items: center;
        }
        #modalImg { max-width: 90%; max-height: 80vh; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .close-expand { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: #800020; }
        .view-details-btn { 
            position: absolute; bottom: 50px; background: #000; color: #fff; 
            padding: 15px 30px; text-decoration: none; letter-spacing: 2px; font-size: 12px; 
        }

        /* WhatsApp */
        .whatsapp-sticky { 
            position: fixed !important; bottom: 25px !important; right: 20px !important; 
            background-color: #e85d43 !important; color: white !important; 
            text-decoration: none !important; border-radius: 50px !important; 
            padding: 12px 20px !important; display: flex !important; align-items: center !important; 
            z-index: 9999; font-size: 14px;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .card img { height: 450px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
        <a href="index.html" class="logo">Onyx—Adire</a>
        <div id="mobileMenu" class="menu-overlay">
            <span onclick="toggleMenu()" style="position: absolute; left: 25px; top: 20px; font-size: 35px; cursor: pointer;">&times;</span>
            <a href="index.html">The Home</a>
            <a href="products.html">The Collection</a>
            <a href="bookings.html">The Atelier</a>
        </div>
    </nav>

    <h3 class="section-title">The Debut Edit</h3>
    <div class="grid" id="main-grid"></div>

    <h3 class="section-title">You May Also Like</h3>
    <div class="grid" id="random-grid"></div>

    <div id="recent-section" style="display:none;">
        <h3 class="section-title">Recently Viewed</h3>
        <div class="grid" id="recent-grid"></div>
    </div>

    <div id="imageModal">
        <span class="close-expand" onclick="closeExpand()">&times;</span>
        <img id="modalImg" src="">
        <a href="#" id="modalDetailLink" class="view-details-btn">VIEW FULL DETAILS</a>
    </div>

    <a href="https://wa.me/2347077978711" class="whatsapp-sticky" target="_blank">💬 Chat Via Whatsapp</a>

    <script>
        const allProducts = [
            { name: "Galaxy Print Jumpsuit", price: "₦58,500.00", img: "galaxy-print-jumpsuit.jpg" },
            { name: "Bespoke Traditional Agbada", price: "₦95,000.00", img: "bespoke-traditional-agbada.jpg" },
            { name: "Adire Silk Tunic", price: "₦45,000.00", img: "adire-silk-tunic.jpg" },
            { name: "Floral Adire Kaftan", price: "₦52,000.00", img: "floral-adire-kaftan.jpg" },
            { name: "Adesewa Adire Set", price: "₦65,000.00", img: "adesewa-adire-set.jpg" },
            { name: "Ebony Silk Boubou", price: "₦65,000.00", img: "ebony-silk-boubou.jpg" },
            { name: "Indigo Kimono", price: "₦40,000.00", img: "indigo-oversized-kimono.jpg" },
            { name: "Midnight Lace Tunic", price: "₦47,000.00", img: "midnight-lace-tunic.jpg" }
        ];

        function createCard(item, isMain = false) {
            return `
                <div class="card" onclick="openExpand('${item.img}', '${encodeURIComponent(item.name)}', '${encodeURIComponent(item.price)}')">
                    <img src="${item.img}">
                    <div class="meta"><h4>${item.name}</h4><p>${item.price}</p></div>
                </div>`;
        }

        function openExpand(img, name, price) {
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDetailLink').href = `product-detail.html?name=${name}&price=${price}&img=${img}`;
            document.getElementById('imageModal').style.display = 'flex';
            
            // Save to recent when "expanded"
            let recent = JSON.parse(localStorage.getItem('onyx_recent')) || [];
            recent = recent.filter(i => i.img !== img);
            recent.unshift({name: decodeURIComponent(name), price: decodeURIComponent(price), img: img});
            localStorage.setItem('onyx_recent', JSON.stringify(recent.slice(0, 5)));
        }

        function closeExpand() { document.getElementById('imageModal').style.display = 'none'; }

        function toggleMenu() {
            const m = document.getElementById("mobileMenu");
            m.style.display = (m.style.display === "flex") ? "none" : "flex";
        }

        window.onload = function() {
            const mGrid = document.getElementById('main-grid');
            allProducts.forEach(item => mGrid.innerHTML += createCard(item));

            const rGrid = document.getElementById('random-grid');
            const shuffled = [...allProducts].sort(() => 0.5 - Math.random()).slice(0, 4);
            shuffled.forEach(item => rGrid.innerHTML += createCard(item));

            const recent = JSON.parse(localStorage.getItem('onyx_recent')) || [];
            if(recent.length > 0) {
                document.getElementById('recent-section').style.display = 'block';
                const recGrid = document.getElementById('recent-grid');
                recent.forEach(item => recGrid.innerHTML += createCard(item));
            }
        };
    </script>
</body>
</html>
