<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collection | Onyx—Adire</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fffcf9; color: #333; }
        
        /* Navigation & Hamburger */
        nav { display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid #f4f4f4; position: relative; background: #fff; }
        .menu-icon { position: absolute; left: 20px; font-size: 28px; cursor: pointer; color: #800020; }
        .logo { text-decoration: none; color: #800020; font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; }

        /* FIXED Mobile Menu Overlay - Centered Style */
        .menu-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: white; 
            z-index: 1000000; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .menu-overlay a { 
            display: block; 
            margin: 20px 0; 
            font-size: 18px; 
            text-decoration: none; 
            color: #333; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            transition: 0.3s;
        }
        .menu-overlay a.active { color: #800020; font-weight: bold; }
        .close-menu { position: absolute; right: 25px; top: 20px; font-size: 35px; cursor: pointer; }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .product-card { text-decoration: none; color: inherit; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; display: block; background: #fdfdfd; }
        .product-meta { padding: 12px 5px; text-align: left; }
        .product-meta h4 { font-family: 'Playfair Display', serif; font-size: 14px; margin: 0; font-weight: normal; font-style: italic; }
        .product-meta p { font-size: 13px; font-weight: bold; margin: 5px 0 0; color: #111; }

        /* Orange WhatsApp Button */
        .whatsapp-sticky { 
            position: fixed !important; bottom: 25px !important; right: 20px !important; 
            background-color: #e85d43 !important; color: white !important; 
            text-decoration: none !important; border-radius: 50px !important; 
            padding: 12px 20px !important; display: flex !important; 
            align-items: center !important; box-shadow: 0 8px 15px rgba(0,0,0,0.2) !important; 
            z-index: 9999 !important; font-size: 14px;
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
            .product-card img { height: 450px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
        <a href="index.html" class="logo">Onyx—Adire</a>
        
        <div id="mobileMenu" class="menu-overlay">
            <span class="close-menu" onclick="toggleMenu()">&times;</span>
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Collection</a>
            <a href="visionaries.html">The Visionaries</a>
            <a href="runway.html">The Runway</a>
            <a href="bookings.html">The Atelier</a>
        </div>
    </nav>

    <header style="text-align: center; padding: 40px 20px 20px;">
        <h1 style="font-family: 'Playfair Display', serif; font-style: italic; color: #800020;">The Debut Edit</h1>
        <p style="font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #999;">8 Timeless Heritage Pieces</p>
    </header>

    <main>
        <section class="product-grid">
            <a href="product-detail.html?name=Adire+Silk+Tunic&price=₦45,000.00&img=adire-silk-tunic.jpg" class="product-card">
                <img src="adire-silk-tunic.jpg" alt="Adire Silk Tunic">
                <div class="product-meta"><h4>Adire Silk Tunic</h4><p>₦45,000.00</p></div>
            </a>
            <a href="product-detail.html?name=Floral+Adire+Kaftan&price=₦52,000.00&img=floral-adire-kaftan.jpg" class="product-card">
                <img src="floral-adire-kaftan.jpg" alt="Floral Adire Kaftan">
                <div class="product-meta"><h4>Floral Adire Kaftan</h4><p>₦52,000.00</p></div>
            </a>
            <a href="product-detail.html?name=Bespoke+Traditional+Agbada&price=₦95,000.00&img=bespoke-traditional-agbada.jpg" class="product-card">
                <img src="bespoke-traditional-agbada.jpg" alt="Bespoke Traditional Agbada">
                <div class="product-meta"><h4>Bespoke Traditional Agbada</h4><p>₦95,000.00</p></div>
            </a>
            <a href="product-detail.html?name=Galaxy+Print+Jumpsuit&price=₦58,500.00&img=galaxy-print-jumpsuit.jpg" class="product-card">
                <img src="galaxy-print-jumpsuit.jpg" alt="Galaxy Print Jumpsuit">
                <div class="product-meta"><h4>Galaxy Print Jumpsuit</h4><p>₦58,500.00</p></div>
            </a>
        </section>
    </main>

    <a href="https://wa.me/2347077978711" class="whatsapp-sticky" target="_blank">
        <span style="margin-right:8px;">💬</span> Chat Via Whatsapp
    </a>

    <script>
        function toggleMenu() {
            var menu = document.getElementById("mobileMenu");
            if (menu.style.display === "flex") {
                menu.style.display = "none";
            } else {
                menu.style.display = "flex";
            }
        }
    </script>
</body>
</html>
