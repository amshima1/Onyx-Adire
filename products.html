<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collection | Onyx—Adire</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fffcf9; color: #333; overflow-x: hidden; }
        
        /* Navigation Bar */
        nav { display: flex; align-items: center; justify-content: center; padding: 25px; border-bottom: 1px solid #f4f4f4; position: relative; background: #fffcf9; z-index: 1000; }
        .menu-icon { position: absolute; left: 20px; font-size: 28px; cursor: pointer; color: #800020; }
        .logo { text-decoration: none; color: #800020; font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; }

        /* Left-Aligned Top-Side Menu (33% Height) */
        .menu-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 35vh; 
            background: #fffcf9; z-index: 1000000; flex-direction: column; padding: 30px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); animation: slideDown 0.35s ease-out; box-sizing: border-box;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .menu-tint { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999999; }
        .menu-overlay a { margin: 8px 0; font-size: 13px; text-decoration: none; color: #800020; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; text-align: left; }

        /* Grid Styling */
        .section-title { font-family: 'Playfair Display', serif; text-align: center; font-style: italic; margin: 40px 0 20px; color: #800020; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; cursor: pointer; border: 1px solid #eee; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; height: 300px; object-fit: cover; background: #f9f9f9; }
        .meta { padding: 10px; text-align: left; }
        .meta h4 { font-family: 'Playfair Display', serif; font-size: 13px; margin: 0; font-style: italic; color: #800020; }
        .meta p { font-size: 11px; font-weight: bold; margin: 5px 0; }

        /* View Modal */
        #imageModal { display: none; position: fixed; z-index: 2000000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); justify-content: center; align-items: center; flex-direction: column; }
        #modalImg { max-width: 90%; max-height: 60vh; object-fit: contain; }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: #800020; }
        .view-btn { margin-top: 20px; background: #000; color: #fff; padding: 12px 30px; text-decoration: none; font-size: 10px; letter-spacing: 2px; }

        .whatsapp-sticky { position: fixed; bottom: 25px; right: 20px; background-color: #e85d43; color: white; text-decoration: none; border-radius: 50px; padding: 12px 22px; display: flex; align-items: center; z-index: 9999; font-size: 13px; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
        <a href="index.html" class="logo">Onyx—Adire</a>
        <div id="menuTint" class="menu-tint" onclick="toggleMenu()"></div>
        <div id="mobileMenu" class="menu-overlay">
            <a href="index.html">The Home</a>
            <a href="products.html" style="font-weight: bold;">The Collection</a>
            <a href="trustees.html">The Visionaries</a> 
            <a href="events.html">The Runway</a> 
            <a href="bookings.html">The Atelier</a>
        </div>
    </nav>

    <h3 class="section-title">The Debut Edit</h3>
    <div class="grid" id="main-grid"></div>

    <h3 class="section-title">You May Also Like</h3>
    <div class="grid" id="discovery-grid"></div>

    <div id="recent-view-section" style="display:none;">
        <h3 class="section-title">Recently Viewed</h3>
        <div class="grid" id="recent-grid"></div>
    </div>

    <div id="imageModal">
        <span class="close-modal" onclick="closeExpand()">&times;</span>
        <img id="modalImg" src="">
        <a href="#" id="modalLink" class="view-btn">VIEW FULL DETAILS</a>
    </div>

    <a href="https://wa.me/2347077978711" class="whatsapp-sticky" target="_blank">
        <span style="margin-right:10px;">💬</span> Chat Via Whatsapp
    </a>

    <script>
        // Use the exact filenames you uploaded to ensure they display
        const allProducts = [
            { name: "Galaxy Print Jumpsuit", price: "₦58,500.00", img: "14506.jpg" },
            { name: "Bespoke Traditional Agbada", price: "₦95,000.00", img: "14518.jpg" },
            { name: "Adire Silk Tunic", price: "₦45,000.00", img: "14520.jpg" },
            { name: "Floral Adire Kaftan", price: "₦52,000.00", img: "14526.jpg" },
            { name: "Ebony Heritage Robe", price: "₦65,000.00", img: "14516.jpg" },
            { name: "Midnight Indigo Wrap", price: "₦47,500.00", img: "14524.jpg" },
            { name: "Royal Thread Boubou", price: "₦72,000.00", img: "14528.jpg" },
            { name: "Indigo Motif Set", price: "₦55,000.00", img: "14530.jpg" }
        ];

        function createCard(item, isRecent = false) {
            return `
                <div class="card" onclick="handleProductClick('${item.img}', '${encodeURIComponent(item.name)}', '${encodeURIComponent(item.price)}')">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x600?text=Product+Image'">
                    <div class="meta">
                        <h4>${item.name}</h4>
                        <p>${item.price}</p>
                    </div>
                </div>`;
        }

        function handleProductClick(img, name, price) {
            // Update Recent View Logic
            let recent = JSON.parse(localStorage.getItem('onyx_recent')) || [];
            recent = recent.filter(i => i.img !== img);
            recent.unshift({name: decodeURIComponent(name), price: decodeURIComponent(price), img: img});
            localStorage.setItem('onyx_recent', JSON.stringify(recent.slice(0, 4))); // Keep last 4
            
            // Open Modal
            document.getElementById('modalImg').src = img;
            document.getElementById('modalLink').href = `product-detail.html?name=${name}&price=${price}&img=${img}`;
            document.getElementById('imageModal').style.display = 'flex';
            
            loadRecentSection();
        }

        function closeExpand() { document.getElementById('imageModal').style.display = 'none'; }

        function toggleMenu() {
            const m = document.getElementById("mobileMenu");
            const t = document.getElementById("menuTint");
            const isOpen = m.style.display === "flex";
            m.style.display = isOpen ? "none" : "flex";
            t.style.display = isOpen ? "none" : "block";
        }

        function loadRecentSection() {
            const recent = JSON.parse(localStorage.getItem('onyx_recent')) || [];
            const container = document.getElementById('recent-grid');
            const section = document.getElementById('recent-view-section');
            
            if (recent.length > 0) {
                section.style.display = 'block';
                container.innerHTML = "";
                recent.forEach(item => { container.innerHTML += createCard(item, true); });
            }
        }

        window.onload = function() {
            const mGrid = document.getElementById('main-grid');
            const dGrid = document.getElementById('discovery-grid');

            // Load 8 products for Main Collection
            allProducts.forEach(item => { mGrid.innerHTML += createCard(item); });

            // Load 4 random products for "You May Also Like"
            const shuffled = [...allProducts].sort(() => 0.5 - Math.random()).slice(0, 4);
            shuffled.forEach(item => { dGrid.innerHTML += createCard(item); });

            loadRecentSection();
        };
    </script>
</body>
</html>
