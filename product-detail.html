<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Onyx—Adire</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Detail Page Layout */
        .detail-container {
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            gap: 30px;
        }
        .image-box {
            width: 100%;
            background: #fdfdfd;
        }
        #main-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        .info-box {
            padding: 10px;
        }
        .product-name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 30px;
        }
        /* Buttons */
        .action-btn {
            display: block;
            width: 100%;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border: 1px solid #000;
            transition: 0.3s;
        }
        .buy-btn { background: #000; color: #fff; border: none; }
        
        /* Floating WhatsApp Button */
        .whatsapp-sticky {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10000;
        }
        .whatsapp-sticky img { width: 25px; margin-right: 10px; }

        @media (min-width: 768px) {
            .detail-container { flex-direction: row; padding: 60px 20px; }
            .image-box { width: 50%; }
            .info-box { width: 45%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Onyx—Adire</a>
            <div class="nav-links">
                <a href="index.html">HOME</a>
                <a href="products.html">COLLECTION</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="detail-container">
            <div class="image-box">
                <img src="" id="main-img" alt="Product Image">
            </div>

            <div class="info-box">
                <h1 id="p-name" class="product-name">Loading Product...</h1>
                <p id="p-price" class="product-price">₦0.00 NGN</p>
                
                <label style="font-size: 10px; letter-spacing: 1px;">SELECT SIZE</label>
                <select style="width: 100%; padding: 12px; margin: 10px 0 30px; border: 1px solid #ddd;">
                    <option>Small (8)</option>
                    <option>Medium (10-12)</option>
                    <option>Large (14-16)</option>
                    <option>Custom Tailoring</option>
                </select>

                <button class="action-btn buy-btn">ADD TO ATELIER BAG</button>
                <p style="font-size: 0.9rem; color: #555; line-height: 1.6;">
                    Hand-dyed in the heart of Nigeria, this piece represents the soul of Adire heritage.
                </p>
            </div>
        </div>

        <section style="padding: 50px 20px; border-top: 1px solid #eee;">
            <h3 style="text-align: center; margin-bottom: 30px; font-style: italic;">You May Also Like</h3>
            <div class="product-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <a href="product-detail.html?name=Bespoke+Traditional+Agbada&price=₦95,000.00&img=bespoke-traditional-agbada.jpg" style="text-decoration:none; color:inherit;">
                    <img src="bespoke-traditional-agbada.jpg" style="width:100%;">
                    <p style="font-size:12px; text-align:center;">Traditional Agbada</p>
                </a>
                <a href="product-detail.html?name=Galaxy+Print+Jumpsuit&price=₦58,500.00&img=galaxy-print-jumpsuit.jpg" style="text-decoration:none; color:inherit;">
                    <img src="galaxy-print-jumpsuit.jpg" style="width:100%;">
                    <p style="font-size:12px; text-align:center;">Galaxy Jumpsuit</p>
                </a>
            </div>
        </section>
    </main>

    <a href="#" id="floating-wa" class="whatsapp-sticky" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        <span>Chat with Atelier</span>
    </a>

    <script>
        // Extracting data from the URL
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const price = params.get('price');
        const img = params.get('img');

        if (name && price && img) {
            // Updating Page Content
            document.getElementById('p-name').innerText = decodeURIComponent(name.replace(/\+/g, ' '));
            document.getElementById('p-price').innerText = decodeURIComponent(price.replace(/\+/g, ' '));
            document.getElementById('main-img').src = img;

            // Updating Floating WhatsApp Link
            const phone = "234XXXXXXXXXX"; // REPLACED WITH YOUR NUMBER
            const msg = `Hello Onyx-Adire, I am interested in ordering the ${decodeURIComponent(name.replace(/\+/g, ' '))} (${price}).`;
            document.getElementById('floating-wa').href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
