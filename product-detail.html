<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Onyx—Adire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="hamburger" id="hamburger-menu">
                <span></span><span></span><span></span>
            </div>
            <a href="index.html" class="logo">Onyx—Adire</a>
            <div class="nav-links" id="nav-links">
                <a href="index.html">THE HOME</a>
                <a href="products.html">THE COLLECTION</a>
            </div>
        </div>
    </nav>

    <main class="product-detail-container">
        <section class="detail-main">
            <div class="detail-gallery">
                <img src="" id="main-img" class="featured-image">
            </div>

            <div class="detail-info">
                <h1 id="p-name" style="font-family: 'Playfair Display'; italic; font-size: 1.8rem; color: #000;">Loading...</h1>
                <p id="p-price" class="product-price" style="font-size: 1.1rem; color: #000; font-weight: 600; margin: 15px 0;">₦0.00 NGN</p>
                
                <div class="purchase-options">
                    <label style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Size</label>
                    <select style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #eee;">
                        <option>8</option><option>10</option><option>12</option><option>14</option><option>16</option>
                    </select>

                    <button class="btn-buy" style="background: #000; color: #fff; width: 100%; padding: 15px; border: none; letter-spacing: 2px; font-size: 0.8rem; cursor: pointer;">BUY IT NOW</button>
                    
                    <a href="#" id="wa-order-btn" class="btn-outline" style="display: block; text-align: center; margin-top: 15px; border: 1px solid #000; color: #000; padding: 12px;">ORDER VIA WHATSAPP</a>
                </div>
                
                <div class="product-description" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                    <p id="p-desc" style="font-size: 0.85rem; line-height: 1.6; color: #333;"></p>
                </div>
            </div>
        </section>

        <section class="recommendations">
            <h2 class="edit-title centralized" style="margin-top: 60px;">You May Also Like</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="floral-adire-kaftan.jpg">
                    <div class="product-meta"><h4>Floral Adire Kaftan</h4><p>₦52,000.00</p></div>
                </div>
                <div class="product-card">
                    <img src="galaxy-print-jumpsuit.jpg">
                    <div class="product-meta"><h4>Galaxy Print Jumpsuit</h4><p>₦58,000.00</p></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Exquisite Piece";
        const price = params.get('price') || "Contact for Price";
        const img = params.get('img');

        document.getElementById('p-name').innerText = name;
        document.getElementById('p-price').innerText = price;
        document.getElementById('main-img').src = img;

        // Custom WhatsApp Message
        const waNumber = "234XXXXXXXXXX"; // Replace with your number
        const waMessage = `Hello Onyx-Adire, I am interested in ordering the ${name} (${price}).`;
        document.getElementById('wa-order-btn').href = `https://wa.me/${waNumber}?text=${encodeURIComponent(waMessage)}`;

        // Dynamic Descriptions
        const descriptions = {
            "Uwata": "Named Uwata, meaning 'My Mother,' this piece is a tribute to the timeless strength of African heritage.",
            "Adesewa": "The Adesewa set blends bold traditional patterns with a sophisticated modern silhouette.",
            "Bespoke": "Our signature agbada, hand-crafted with premium textiles for the discerning visionary."
        };

        let foundDesc = "A curated masterpiece from the Onyx—Adire Heritage Collection, designed for elegance and cultural pride.";
        for (let key in descriptions) {
            if (name.includes(key)) foundDesc = descriptions[key];
        }
        document.getElementById('p-desc').innerText = foundDesc;

        // Hamburger
        const hamburger = document.getElementById('hamburger-menu');
        const navLinks = document.getElementById('nav-links');
        hamburger.addEventListener('click', () => { navLinks.classList.toggle('active'); });
    </script>
</body>
</html>
