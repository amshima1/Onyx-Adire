<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries & Bookings | Onyx-Adire</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Form Styles for this page */
        .booking-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 25px;
            border: 2px solid var(--brand-red);
            background: #fff;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            color: var(--brand-red);
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            font-family: serif;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--brand-red);
        }
        .submit-btn {
            width: 100%;
            background-color: var(--brand-red);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="announcement-bar">
        <marquee scrollamount="7">
            CUSTOM MEASUREMENTS • BRIDAL ADIRE • GLOBAL SHIPPING • BOOK YOUR APPOINTMENT TODAY
        </marquee>
    </div>

    <nav>
        <div class="nav-left">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <div class="nav-centre">
            <h1 class="logo">ONYX-ADIRE</h1>
        </div>

        <div class="nav-right"></div>

        <div id="nav-menu" class="menu-links">
            <a href="index.html">HOME</a>
            <a href="gallery.html">SHOWCASE</a>
            <a href="trustees.html">TRUSTEES</a>
            <a href="events.html">EVENTS</a>
            <a href="bookings.html">INQUIRIES</a>
        </div>
    </nav>

    <header class="luxury-header">
        <h2 class="red-white-box">MAKE AN INQUIRY</h2>
    </header>

    <main class="container">
        <div class="booking-container">
            <form id="inquiryForm" onsubmit="handleBookingSubmit(event)">
                <div class="form-group">
                    <label for="name">FULL NAME</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="interest">SERVICE INTEREST</label>
                    <select id="interest">
                        <option value="custom">Bespoke Custom Fitting</option>
                        <option value="wholesale">Wholesale / Bulk Orders</option>
                        <option value="bridal">Bridal & Aso-Ebi</option>
                        <option value="ready">Ready-to-Wear Purchase</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">MESSAGE / MEASUREMENTS</label>
                    <textarea id="message" rows="5" placeholder="Provide details about your design or size..."></textarea>
                </div>

                <button type="submit" class="submit-btn">SEND TO ONYX-ADIRE</button>
            </form>
        </div>
    </main>

    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-bar" target="_blank">
        <div class="whatsapp-content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            <span>Chat Via Whatsapp</span>
        </div>
    </a>

    <footer>
        <p>&copy; 2026 ONYX-ADIRE | <span id="clock"></span></p>
    </footer>

    <script src="script.js"></script>

    <script>
        function handleBookingSubmit(event) {
            event.preventDefault();
            alert("Your inquiry has been received! Our team will contact you shortly.");
            event.target.reset();
        }
    </script>
</body>
</html>
