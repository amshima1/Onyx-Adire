<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .booking-form { max-width: 500px; margin: 40px auto; padding: 20px; text-align: left; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="menu-icon" onclick="toggleNav()"><div></div><div></div><div></div></div>
            <a href="index.html" class="logo">Onyx—Adire</a>
            <div style="width: 30px;"></div>
        </nav>
    </header>

    <div id="mySidenav">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="collection-detail.html">Collection Detail</a>
        <a href="events.html">Events</a>
        <a href="bookings.html">Bookings</a>
    </div>
    <div id="overlay"></div>

    <main style="padding-top: 100px;">
        <h1>Book a Consultation</h1>
        <form class="booking-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label>Service</label>
                <select>
                    <option>Bespoke Tailoring</option>
                    <option>Bulk Order</option>
                </select>
            </div>
            <button class="subscribe-btn" style="width: 100%;">Submit Inquiry</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
