<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx-Adire | Haute Couture Heritage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
            --header-height: 105px;
        }

        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: var(--onyx-black); overflow-x: hidden; }

        /* HEADER SYSTEM */
        .master-header { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); z-index: 9999; background: white; border-bottom: 1px solid #eee; }
        .promo-bar { background-color: var(--brand-red); color: white; height: 35px; display: flex; align-items: center; overflow: hidden; position: relative; }
        .marquee-text { position: absolute; white-space: nowrap; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; animation: scrolling 25s linear infinite; }
        @keyframes scrolling { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        
        header { height: 70px; display: flex; align-items: center; justify-content: center; position: relative; }
        .hamburger { position: absolute; left: 20px; font-size: 28px; cursor: pointer; transition: 0.3s; }
        .logo { font-family: 'Bodoni Moda', serif; font-size: 24px; text-transform: uppercase; text-decoration: none; color: var(--onyx-black); letter-spacing: 4px; font-weight: 700; }

        /* SIDE MENU (X REMOVED) */
        .side-menu { height: calc(100vh - var(--header-height)); width: 0; position: fixed; z-index: 9000; top: var(--header-height); left: 0; background-color: white; overflow-x: hidden; transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0); box-shadow: 5px 0 15px rgba(0,0,0,0.05); }
        .menu-links { padding-top: 40px; display: flex; flex-direction: column; }
        .menu-links a { padding: 20px 40px; font-family: 'Bodoni Moda', serif; font-size: 18px; text-decoration: none; color: var(--onyx-black); text-transform: uppercase; border-bottom: 1px solid #f9f9f9; letter-spacing: 2px; transition: 0.3s; }
        .menu-links a:hover { padding-left: 50px; color: var(--brand-red); }

        /* HERO SECTION */
        .hero { margin-top: var(--header-height); height: 80vh; background: url('hero-image.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; color: white; position: relative; }
        .hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); }
        .hero-content { position: relative; z-index: 2; }
        .hero-content h1 { font-family: 'Bodoni Moda', serif; font-size: 45px; text-transform: uppercase; letter-spacing: 10px; margin-bottom: 20px; }
        .cta-btn { background: white; color: var(--onyx-black); padding: 15px 40px; text-decoration: none; text-transform: uppercase; font-size: 12px; font-weight: 700; letter-spacing: 2px; transition: 0.3s; }
        .cta-btn:hover { background: var(--brand-red); color: white; }

        /* FOOTER */
        footer { background-color: var(--brand-red); color: white; text-align: center; padding: 60px 20px; }
        .footer-socials a { color: white; font-size: 24px; margin: 0 15px; text-decoration: none; }

        /* WHATSAPP FLOAT */
        .whatsapp-float { position: fixed; bottom: 30px; right: 20px; background-color: var(--brand-red); color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-size: 11px; font-weight: 600; z-index: 9998; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="master-header">
        <div class="promo-bar"><div class="marquee-text">ONYX-ADIRE • THE ART OF MODERN ADIRE • WORLDWIDE SHIPPING • BESPOKE COUTURE •</div></div>
        <header>
            <div class="hamburger" onclick="toggleNav()">☰</div>
            <a href="index.html" class="logo">Onyx-Adire</a>
        </header>
    </div>

    <div id="mySideMenu" class="side-menu">
        <div class="menu-links">
            <a href="index.html" onclick="toggleNav()">Home</a>
            <a href="collection.html">The Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="size-profile.html">Size Profile</a>
            <a href="inquiries.html">Inquiries</a>
        </div>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1>Couture Heritage</h1>
            <a href="collection.html" class="cta-btn">Explore Collection</a>
        </div>
    </section>

    <footer>
        <h2 style="font-family: 'Bodoni Moda'; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px;">The Onyx Circle</h2>
        <div class="footer-socials">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
    </footer>

    <a href="https://wa.me/234707797XXXX" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i> WhatsApp Concierge
    </a>

    <script>
        function toggleNav() {
            var menu = document.getElementById("mySideMenu");
            var hamburger = document.querySelector(".hamburger");
            
            if (menu.style.width === "280px") {
                menu.style.width = "0";
                hamburger.innerHTML = "☰"; // Reset to Hamburger icon
            } else {
                menu.style.width = "280px";
                // Optionally, change hamburger icon to a specific style if you wish, 
                // but currently it stays as ☰ or can be toggled to something else here.
            }
        }
    </script>
</body>
</html>
