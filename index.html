<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx-Adire | Haute Couture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
            --off-white: #fdfdfd;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--off-white);
            color: var(--onyx-black);
        }

        /* 1. TOP HEADER SECTION */
        .promo-bar {
            background-color: var(--brand-red);
            color: white;
            padding: 12px 0;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px 5%;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: relative;
        }

        .hamburger {
            position: absolute;
            left: 5%;
            font-size: 28px;
            cursor: pointer;
        }

        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--onyx-black);
            text-decoration: none;
            text-transform: uppercase;
        }

        /* 2. SUPER HERO PICTURE (Full Display) */
        .hero-section {
            width: 100%;
            height: auto; /* Changed from 100vh to show full image */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }

        .hero-image {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* 3. STYLISH EDITORIAL HEADING */
        .debut-edit-container {
            text-align: center;
            padding: 80px 20px 40px 20px;
        }

        .debut-title {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(48px, 10vw, 84px); /* Fluid on mobile */
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
            line-height: 1.1;
        }

        .edit-subtitle {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #666;
            margin-top: 15px;
            display: block;
        }

        /* 4. COLLECTION GRID LAYOUT (16 Pics) */
        .collection-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 100px 5%; /* Space for WhatsApp */
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 per row */
            gap: 20px;
        }

        .collection-item {
            position: relative;
            background-color: #fff;
            border: 1px solid #f0f0f0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .collection-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .collection-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        .item-details {
            padding: 15px;
            text-align: center;
        }

        .item-name {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .item-price {
            font-size: 12px;
            color: #777;
        }

        /* 5. FLOATING RED WHATSAPP */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: var(--brand-red);
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        /* Mobile Responsiveness */
        @media (max-width: 992px) {
            .collection-grid { grid-template-columns: repeat(2, 1fr); /* 2 per row on tablets */ }
            .logo { font-size: 28px; }
        }

        @media (max-width: 600px) {
            .collection-grid { grid-template-columns: 1fr; /* 1 per row on phones */ }
            .debut-title { font-size: 40px; }
            .whatsapp-float { bottom: 20px; right: 20px; width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        ONYX-ADIRE // The Heritage Drop
    </div>
    <nav>
        <div class="hamburger">☰</div>
        <a href="#" class="logo">Onyx-Adire</a>
    </nav>

    <section class="hero-section">
        <img src="Onyx-Adire18.jpg" alt="Onyx-Adire Masterpiece" class="hero-image">
    </section>

    <div class="debut-edit-container">
        <h1 class="debut-title">THE DEBUT EDIT</h1>
        <span class="edit-subtitle">A curation of hand-dyed artistry</span>
    </div>

    <main class="collection-grid">
        
        <script>
            for (let i = 1; i <= 16; i++) {
                document.write(`
                    <div class="collection-item">
                        <img src="Onyx-Adire${i}.jpg" alt="Onyx-Adire Collection Item ${i}" class="collection-img">
                        <div class="item-details">
                            <p class="item-name">Onyx Adire Piece ${i}</p>
                            <p class="item-price">Contact for pricing</p>
                        </div>
                    </div>
                `);
            }
        </script>
        
    </main>

    <a href="https://wa.me/YOUR_PHONE_NUMBER" class="whatsapp-float" target="_blank">
        <svg width="30" height="30" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/>
        </svg>
    </a>

</body>
</html>
