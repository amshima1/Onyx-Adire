<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx-Adire | The Debut Edit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
            --glass-white: rgba(255, 255, 255, 0.98);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fff;
            overflow-x: hidden;
        }

        /* 1. ANNOUNCEMENT BAR */
        .promo-bar {
            background-color: var(--brand-red);
            color: white;
            padding: 12px 0;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 4000;
        }

        .marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 2. NAVIGATION */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 5%;
            background: white;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 35px;
            z-index: 3000;
        }

        .hamburger {
            position: absolute;
            left: 5%;
            font-size: 28px;
            cursor: pointer;
            color: var(--onyx-black);
        }

        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--onyx-black);
        }

        /* 3. SIDE MENU (THE POP OUT) */
        .side-menu {
            height: 100vh;
            width: 0;
            position: fixed;
            z-index: 5000;
            top: 0;
            left: 0;
            background-color: var(--glass-white);
            overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        /* The X inside the pop out */
        .close-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 35px;
            cursor: pointer;
            color: var(--brand-red);
        }

        .menu-links {
            padding-top: 100px;
        }

        .side-menu a {
            padding: 15px 40px;
            text-decoration: none;
            font-size: 22px;
            color: var(--onyx-black);
            font-family: 'Bodoni Moda', serif;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 4. CONTENT */
        .hero-image { width: 100%; height: auto; display: block; }

        .debut-header {
            text-align: center;
            padding: 50px 20px;
            font-family: 'Bodoni Moda', serif;
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .collection-item { text-align: center; margin-bottom: 25px; }
        .collection-item img { width: 100%; height: auto; display: block; margin-bottom: 10px; }
        .item-price { font-weight: 500; font-size: 15px; }

        /* 5. FOOTER & NEWSLETTER */
        footer {
            background-color: var(--brand-red);
            color: white;
            text-align: center;
            padding: 60px 20px 100px 20px; /* Extra bottom padding */
        }

        .newsletter-box {
            background: white;
            padding: 5px;
            display: flex;
            width: 90%;
            max-width: 350px;
            margin: 20px auto 40px auto;
        }

        .newsletter-box input { border: none; padding: 12px; flex-grow: 1; outline: none; }
        .newsletter-box button { background: var(--onyx-black); color: white; border: none; padding: 0 15px; cursor: pointer; }

        .social-icons a { color: white; margin: 0 15px; font-size: 26px; }

        /* 6. WHATSAPP PILL (SHIFTED UP) */
        .whatsapp-float {
            position: fixed;
            bottom: 110px; /* Shifted up to avoid covering social icons */
            right: 20px;
            background-color: var(--brand-red);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 6000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        <div class="marquee">
            ONYX-ADIRE HERITAGE DROP • LUXURY CRAFTSMANSHIP • WORLDWIDE DELIVERY • 
        </div>
    </div>

    <header>
        <div class="hamburger" onclick="openNav()">☰</div>
        <a href="#" class="logo">Onyx-Adire</a>
    </header>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">✕</span>
        <div class="menu-links">
            <a href="#" onclick="closeNav()">Home</a>
            <a href="#" onclick="closeNav()">Collection</a>
            <a href="#" onclick="closeNav()">Trustees</a>
            <a href="#" onclick="closeNav()">Events</a>
            <a href="#" onclick="closeNav()">Inquiries</a>
        </div>
    </div>

    <img src="Onyx-Adire18.jpg" alt="Hero" class="hero-image">

    <h1 class="debut-header">THE DEBUT EDIT</h1>

    <div class="collection-grid">
        <script>
            const prices = ["₦45,000", "₦52,000", "₦38,500", "₦60,000", "₦42,000", "₦55,000", "₦48,000", "₦65,000", "₦35,000", "₦50,000", "₦58,000", "₦44,500", "₦62,000", "₦39,000", "₦51,000", "₦70,000"];
            for (let i = 1; i <= 16; i++) {
                document.write(`
                    <div class="collection-item">
                        <img src="Onyx-Adire${i}.jpg" alt="Piece ${i}">
                        <div class="item-price">${prices[i-1]}</div>
                    </div>
                `);
            }
        </script>
    </div>

    <footer>
        <h2 style="font-family: 'Bodoni Moda'; text-transform: uppercase;">Subscribe to our newsletter</h2>
        <div class="newsletter-box">
            <input type="email" placeholder="Email Address">
            <button>Join</button>
        </div>
        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
    </footer>

    <a href="https://wa.me/YOURNUMBER" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i> Chat via WhatsApp
    </a>

    <script>
        function openNav() {
            document.getElementById("mySideMenu").style.width = "280px";
        }

        function closeNav() {
            document.getElementById("mySideMenu").style.width = "0";
        }
    </script>

</body>
</html>
