<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Onyx—Adire Experience</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }
    header {
      background: black;
      color: white;
      text-align: center;
      padding: 30px 10px;
    }
    header h1 {
      font-size: 28px;
      margin: 0;
    }
    .section-title {
      text-align: center;
      margin: 30px 0 10px;
      font-size: 24px;
      font-weight: bold;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 250px;
      padding: 15px;
      text-align: center;
    }
    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .product h3 {
      margin: 10px 0 5px;
      font-size: 18px;
    }
    .product p {
      color: #555;
      font-weight: bold;
    }
    /* Floating WhatsApp button */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <header>
    <h1>THE ONYX—ADIRE EXPERIENCE</h1>
  </header>

  <div class="section-title">The Debut Edit</div>

  <div class="products">
    <div class="product">
      <img src="https://via.placeholder.com/250x200" alt="Todun Adri Iro and Buba">
      <h3>Todun Adri Iro and Buba</h3>
      <p>₦60,000</p>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/250x200" alt="Adesewa Pants Set">
      <h3>Adesewa Pants Set</h3>
      <p>₦55,000</p>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/250x200" alt="Adesewa Set">
      <h3>Adesewa Set</h3>
      <p>₦48,000</p>
    </div>
  </div>

  <!-- WhatsApp chat button -->
  <a href="https://wa.me/2348012345678" class="whatsapp">💬</a>
</body>
</html>
