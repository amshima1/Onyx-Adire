<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Luxury Nigerian Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="overlay" onclick="toggleNav()"></div>

    <header>
        <div class="announcement-bar">
            <span>✦ THE ONYX—ADIRE EXPERIENCE ✦ WORLDWIDE SHIPPING ✦</span>
        </div>
        <nav>
            <div class="menu-icon" onclick="toggleNav()">
                <div></div><div></div><div></div>
            </div>
            <a href="index.html" class="logo">Onyx—Adire</a>
            <div style="width: 30px;"></div>
        </nav>
    </header>

    <div id="mySidenav" class="sidenav">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="trustees.html">Trustees</a>
        <a href="events.html">Events</a>
        <a href="bookings.html">Bookings</a>
    </div>

    <main>
        <section class="hero-section" style="height: 80vh; overflow: hidden;">
            <img src="Onyx-Adire18.jpg" alt="Featured" style="width: 100%; height: 100%; object-fit: cover;">
        </section>

        <section class="debut-header">
            <h2>Featured Collections</h2>
        </section>

        <div class="gallery-grid">
            <div class="gallery-card" onclick="openProduct('Todun Iro & Buba', '₦95,000', 'Onyx-Adire1.jpg')">
                <img src="Onyx-Adire1.jpg" alt="Item 1">
                <div class="card-info"><span class="item-name">Todun Iro & Buba</span><span class="item-price">₦95,000</span></div>
            </div>
            <div class="gallery-card" onclick="openProduct('Adesewa Set', '₦48,000', 'Onyx-Adire2.jpg')">
                <img src="Onyx-Adire2.jpg" alt="Item 2">
                <div class="card-info"><span class="item-name">Adesewa Set</span><span class="item-price">₦48,000</span></div>
            </div>
            </div>

        <section id="recent-section" style="padding: 50px 5%; display: none;">
            <h3 style="margin-bottom: 20px; text-transform: uppercase; font-size: 14px; letter-spacing: 2px;">Recently Viewed</h3>
            <div id="recent-grid" class="gallery-grid" style="grid-template-columns: repeat(4, 1fr); gap: 15px;">
                </div>
        </section>

        <section class="footer-cta">
            <h2>Subscribe to our newsletter</h2>
            <div class="subscribe-container">
                <input type="email" class="email-input" placeholder="Enter your email">
                <button class="subscribe-btn">Join</button>
            </div>
        </section>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImg" src="" style="width: 100%; max-height: 500px; object-fit: cover;">
                <h2 id="modalName" style="margin-top: 20px;"></h2>
                <p id="modalPrice" style="color: #666;"></p>
                <button class="subscribe-btn" style="width: 100%; margin-top: 20px;">Order on WhatsApp</button>
                
                <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
                
                <h3>You May Also Like</h3>
                <div class="gallery-grid" style="grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px;">
                    <div class="gallery-card"><img src="Onyx-Adire5.jpg"><p>Midnight Tunic</p></div>
                    <div class="gallery-card"><img src="Onyx-Adire7.jpg"><p>Gold Agbada</p></div>
                    <div class="gallery-card"><img src="Onyx-Adire10.jpg"><p>Abaya Silk</p></div>
                    <div class="gallery-card"><img src="Onyx-Adire12.jpg"><p>Geo Boubou</p></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
