<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx-Adire | Fashion House</title>
    <style>
        /* Modern Luxe Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* 1. Scrolling Announcement Bar */
        .promo-bar {
            background-color: var(--brand-red);
            color: white;
            padding: 10px 0;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 2. Top Navigation */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 5%;
            position: relative;
            border-bottom: 1px solid #eee;
        }

        /* Hamburger Menu Icon */
        .hamburger {
            position: absolute;
            left: 5%;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
        }

        /* Logo - Centered in line with Hamburger */
        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--onyx-black);
            text-decoration: none;
        }

        /* 3. Slide-out Menu Overlay */
        .nav-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: rgba(255,255,255,0.98);
            overflow-x: hidden;
            transition: 0.5s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .nav-overlay a {
            padding: 15px;
            text-decoration: none;
            font-size: 24px;
            color: var(--onyx-black);
            font-family: 'Bodoni Moda', serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .nav-overlay a:hover {
            color: var(--brand-red);
        }

        .closebtn {
            position: absolute;
            top: 30px;
            left: 5%;
            font-size: 40px;
            cursor: pointer;
        }

        /* 4. Hero Section */
        .hero-section {
            width: 100%;
            height: 80vh; /* Responsive height */
            background-color: #f5f5f5;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image fills space without stretching */
            display: block;
        }

        @media (max-width: 600px) {
            .logo { font-size: 24px; }
            .hero-section { height: 60vh; }
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        <div class="marquee">
            WORLDWIDE SHIPPING AVAILABLE &nbsp; • &nbsp; NEW ADIRE PIECES DROPPING SOON &nbsp; • &nbsp; EXPERIENCE THE ART OF ONYX-ADIRE &nbsp; • &nbsp; 
        </div>
    </div>

    <header>
        <div class="hamburger" onclick="openNav()">☰</div>
        <a href="#" class="logo">Onyx-Adire</a>
    </header>

    <div id="myNav" class="nav-overlay">
        <span class="closebtn" onclick="closeNav()">&times;</span>
        <a href="#">Home</a>
        <a href="#">Collection</a>
        <a href="#">Trustees</a>
        <a href="#">Events</a>
        <a href="#">Inquiries</a>
    </div>

    <section class="hero-section">
        <img src="Onyx-Adire18.jpg" alt="Onyx-Adire Collection" class="hero-image">
    </section>

    <script>
        function openNav() {
            document.getElementById("myNav").style.width = "100%";
        }

        function closeNav() {
            document.getElementById("myNav").style.width = "0%";
        }
    </script>

</body>
</html>
